[global]
ollama_url = "http://localhost:11434"
default_timeout = 300

# コーディング特化：圧倒的な実装・デバッグ能力 (Qwen 3.6 Coder)
[[models]]
name = "qwen3.6-coder:27b"
role = "Coder"
description = "Current gold standard for local coding assistants. Exceptional SWE-bench performance and logic."
priority = 1
system_prompt = "You are an expert software engineer. Focus on clean, efficient, and well-documented code. Provide accurate implementation and rigorous logic."

[models.options]
temperature = 0.2
top_p = 0.95
top_k = 40
repeat_penalty = 1.1
num_ctx = 32768
num_predict = -1
seed = 42

# 高密度知能モデル：汎用・分析・高度な推論 (Gemma 4)
[[models]]
name = "gemma4:27b"
role = "Expert"
description = "Google's latest high-density model. Exceptional reasoning, analysis, and general intelligence for its size."
priority = 2
system_prompt = "You are a highly intelligent and precise assistant. Provide detailed, accurate, and well-reasoned information across a wide range of topics."

[models.options]
temperature = 0.7
top_p = 0.9
top_k = 50
repeat_penalty = 1.0
num_ctx = 32768
num_predict = 4096

# 超軽量・高速：クイックチェック・低リソース環境 (Gemma 4 Lite)
[[models]]
name = "gemma4:4b"
role = "Lite"
description = "Fast and lightweight model for simple tasks, quick checks, and low-resource environments."
priority = 3
system_prompt = "You are a concise and efficient assistant. Provide short, direct, and accurate answers."

[models.options]
temperature = 0.5
top_p = 0.9
top_k = 40
repeat_penalty = 1.1
num_ctx = 8192
num_predict = 1024
low_vram = true
