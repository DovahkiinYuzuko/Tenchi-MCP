[global]
ollama_url = "http://localhost:11434"
default_timeout = 300

# 汎用アシスタント：バランス重視 (Llama 4)
[[models]]
name = "llama4-scout:17b"
role = "Generalist"
description = "High-performance general assistant for daily tasks and reasoning."
priority = 1
system_prompt = "You are a helpful and efficient assistant. Provide balanced and thoughtful responses."

[models.options]
temperature = 0.7
num_ctx = 8192

# コーディング特化：最強の補完・実装能力 (Qwen 3.5/3.6)
[[models]]
name = "qwen3.6-coder:27b"
role = "Coder"
description = "Specialized in software engineering, providing accurate code and logic."
priority = 2
system_prompt = "You are an expert software engineer. Focus on clean, efficient, and well-documented code."

[models.options]
temperature = 0.2
num_ctx = 16384

# 軽量・高速：簡単なタスクや低スペック環境用 (Gemma 4 / Llama 3.2)
[[models]]
name = "gemma4:9b"
role = "Lite"
description = "Fast and lightweight model for simple tasks and quick checks."
priority = 3
system_prompt = "You are a concise assistant. Provide short and direct answers."

[models.options]
temperature = 0.5
num_ctx = 4096
low_vram = true

# 推論特化：複雑な数学や論理パズル用 (DeepSeek-R2)
[[models]]
name = "deepseek-r2:latest"
role = "Thinker"
description = "Advanced reasoning model for complex logic, math, and deep analysis."
priority = 4
system_prompt = "You are a deep-thinking logical analyzer. Think step-by-step to solve complex problems."

[models.options]
temperature = 0.3
num_ctx = 16384
