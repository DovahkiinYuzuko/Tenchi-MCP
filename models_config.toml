[global]
# Ollama APIのベースURL / Base URL for Ollama API
ollama_url = "http://localhost:11434"
# デフォルトのタイムアウト（秒） / Default timeout in seconds
default_timeout = 300

# コーディング・ガッツリ実装用 / Heavy-duty coding and implementation
# sushi-coder-custom: ユズコの環境でメインのコーディングを担う最強モデル
[[models]]
name = "sushi-coder-custom:latest"
role = "Coder"
description = "Specialized in software engineering. High performance in complex logic and Rust implementation."
priority = 1
system_prompt = "You are an expert software engineer. Focus on clean, efficient, and well-documented code. Provide accurate implementation and rigorous logic."

[models.options]
temperature = 0.2
top_p = 0.95
num_ctx = 32768
num_predict = -1
seed = 42

# コードレビュー・破壊的変更防止用 / Code review and non-destructive refactoring
# carstenuhlig/omnicoder-9b: 「コードを壊さない」という特徴を持つ、レビューに最適なモデル
[[models]]
name = "carstenuhlig/omnicoder-9b:latest"
role = "Reviewer"
description = "Specialized in code review and refactoring. Known for maintaining code integrity and logic consistency."
priority = 2
system_prompt = "You are a meticulous code reviewer. Your primary goal is to identify bugs and suggest improvements without breaking existing functionality. Keep original logic intact unless absolutely necessary."

[models.options]
temperature = 0.3
top_p = 0.9
num_ctx = 32768
num_predict = 4096

# 万能アシスタント・軽量環境用 / Universal assistant and efficient processing
# gemma4-e4b-custom-uncensored: 思考力が高く、幅広いタスクに対応できる万能モデル
[[models]]
name = "gemma4-e4b-custom-uncensored:latest"
role = "Generalist"
description = "Universal assistant with strong reasoning. Fast and efficient for various general tasks."
priority = 3
system_prompt = "You are a highly intelligent and precise assistant. Provide detailed, accurate, and well-reasoned information. Be concise when possible."

[models.options]
temperature = 0.7
top_p = 0.9
num_ctx = 8192
num_predict = 2048
